name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  build:
    needs: [check]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo build

  integration:
    needs: [check, build]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      - name: Mock upstream integration tests
        run: python test_mock_upstream.py
      - name: Routing integration tests
        run: python test_routing.py
      - name: Persistence and SSE tests
        run: python test_persistence_eviction_sse.py

  package:
    needs: [check, integration]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
            binary: stack-intercept
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
            binary: stack-intercept.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Configure MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Strip binary (Linux only)
        if: runner.os == 'Linux'
        run: strip target/release/${{ matrix.binary }}
      - name: Create package directory
        run: |
          mkdir -p dist/stack-intercept
          cp target/release/${{ matrix.binary }} dist/stack-intercept/
          cp .env.example README.md download_model.sh dist/stack-intercept/
          cp -r docs dist/stack-intercept/
      - name: Package Linux tarball
        if: runner.os == 'Linux'
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tar czf "stack-intercept-v${VERSION}-${{ matrix.target }}.tar.gz" -C dist stack-intercept
      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches.Groups[1].Value
          Compress-Archive -Path dist\stack-intercept -DestinationPath "stack-intercept-v${version}-${{ matrix.target }}.zip"
      - name: Generate SHA256 checksum
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "${{ runner.os }}" = "Linux" ]; then
            sha256sum "stack-intercept-v${VERSION}-${{ matrix.target }}.tar.gz" > checksums.txt
          else
            sha256sum "stack-intercept-v${VERSION}-${{ matrix.target }}.zip" > checksums.txt
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: stack-intercept-${{ matrix.target }}
          path: |
            stack-intercept-*-${{ matrix.target }}.*
            checksums.txt
